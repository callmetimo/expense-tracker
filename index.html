<script>

// ── FIX 1: UPDATE calGetMonthData ─────────────────────────────
function calGetMonthData(year, month) {
  // Gunakan getAllOpexRows() agar data lokal & historis terbaca
  const allRows = getAllOpexRows(); 
  const mIndex = month - 1; // Ubah ke 0-indexed untuk komparasi

  const txByDay = {};
  allRows.forEach(r => {
    if (r.y !== year || r.m !== mIndex) return; // Fix komparasi index
    if (r.cat === 'Income' || r.cat === 'Investment') return;
    const key = r.d;
    if (!txByDay[key]) txByDay[key] = [];
    txByDay[key].push(r);
  });

  const total = allRows
    .filter(r => r.y === year && r.m === mIndex && r.cat !== 'Income' && r.cat !== 'Investment')
    .reduce((s, r) => s + (r.exp || 0), 0);

  // 3-month avg baseline
  let avgTotal = 0, avgCount = 0;
  for (let i = 1; i <= 3; i++) {
    let ay = year, am = mIndex - i; 
    if (am < 0) { am += 12; ay -= 1; }
    const mt = allRows
      .filter(r => r.y === ay && r.m === am && r.cat !== 'Income' && r.cat !== 'Investment')
      .reduce((s, r) => s + (r.exp || 0), 0);
    if (mt > 0) { avgTotal += mt; avgCount++; }
  }
  const avg = avgCount > 0 ? Math.round(avgTotal / avgCount) : 0;
  const pct = avg > 0 ? Math.min(Math.round((total / avg) * 100), 100) : 0;
  const isOver = avg > 0 && total > avg;

  return { total, avg, pct, isOver, txByDay };
}

// ── FIX 2: UPDATE calBuildMonthHTML (Klik untuk semua hari) ────
function calBuildMonthHTML(year, month, today) {
  const { total, avg, pct, isOver, txByDay } = calGetMonthData(year, month);
  const mName = calMonthName(year, month);
  const totalFmt = total ? fRpS(total) : 'Rp 0';
  const avgFmt = avg ? fRpS(avg) : '';
  const fillPct = pct + '%';
  const overCls = isOver ? ' over' : '';

  const progressHTML = avg > 0
    ? `<div class="cal-progress-wrap">
        <div class="cal-progress-bar"><div class="cal-progress-fill${overCls}" style="width:${fillPct}"></div></div>
        <div class="cal-progress-right">
          <div class="cal-progress-amount">${totalFmt}</div>
          <div class="cal-progress-avg">3mo avg ${avgFmt}</div>
        </div>
      </div>`
    : `<div class="cal-progress-wrap">
        <div class="cal-progress-bar"><div class="cal-progress-fill" style="width:0%"></div></div>
        <div class="cal-progress-right">
          <div class="cal-progress-amount">${totalFmt}</div>
        </div>
      </div>`;

  const firstDay = new Date(year, month - 1, 1).getDay(); 
  const daysInMon = new Date(year, month, 0).getDate();
  const offset = (firstDay + 6) % 7;
  const prevMonth = month === 1 ? 12 : month - 1;
  const prevYear = month === 1 ? year - 1 : year;
  const daysInPrev = new Date(prevYear, prevMonth, 0).getDate();

  let cells = [];
  for (let i = offset - 1; i >= 0; i--) cells.push({ day: daysInPrev - i, cur: false });
  for (let d = 1; d <= daysInMon; d++) cells.push({ day: d, cur: true });
  const remainder = cells.length % 7;
  if (remainder > 0) { for (let d = 1; d <= 7 - remainder; d++) cells.push({ day: d, cur: false }); }

  const todayY = today.getFullYear(), todayM = today.getMonth() + 1, todayD = today.getDate();

  let weeksHTML = '';
  for (let w = 0; w < cells.length / 7; w++) {
    let weekCells = '';
    for (let d = 0; d < 7; d++) {
      const cell = cells[w * 7 + d];
      const isCur = cell.cur;
      const isToday = isCur && year === todayY && month === todayM && cell.day === todayD;
      const txs = isCur ? (txByDay[cell.day] || []) : [];
      const dayTotal = txs.reduce((s, r) => s + (r.exp || 0), 0);

      let cls = 'cal-day';
      if (!isCur) cls += ' other-month';
      else if (txs.length > 0) cls += ' has-data';
      if (isToday) cls += ' today';

      const txJson = JSON.stringify(txs.map(r => ({
        cat: r.cat, pm: r.pm, amt: r.exp || r.inc, type: r.cat==='Income'?'income':(r.cat==='Investment'?'invest':'')
      }))).replace(/'/g, '&#39;');
      
      const dateStr = isCur ? `${year}-${String(month).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : '';
      const totalStr = dayTotal ? fRpS(dayTotal) : '';
      // FIX: Semua sel di bulan aktif bisa di-klik
      const clickAttr = isCur ? `onclick="calSelectDay(this,'${dateStr}','${totalStr}')"` : '';

      weekCells += `<div class="${cls}" ${clickAttr} data-txns='${txJson}'>
        <div class="cal-day-num">${cell.day}</div>
        ${dayTotal ? `<div class="cal-day-total">${calFormatAmount(dayTotal)}</div>` : (isToday ? '<div class="cal-day-total">Today</div>' : '')}
      </div>`;
    }
    weeksHTML += `<div class="cal-week-row">${weekCells}</div>`;
  }
  return `<div class="cal-month-label"><div class="cal-month-name">${mName}</div>${progressHTML}</div><div class="cal-week-section">${weeksHTML}</div>`;
}

// ── FIX 3: UPDATE calGetCurrentWeekHTML (Klik untuk semua hari) ────
function calGetCurrentWeekHTML(year, month, today) {
  const { txByDay } = calGetMonthData(year, month);
  const todayDow = (today.getDay() + 6) % 7; 
  const monDate = new Date(today);
  monDate.setDate(today.getDate() - todayDow);

  let cells = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monDate); d.setDate(monDate.getDate() + i);
    const dy = d.getFullYear(), dm = d.getMonth() + 1, dd = d.getDate();
    const isCur = (dy === year && dm === month);
    const isToday = (dy === today.getFullYear() && dm === today.getMonth() + 1 && dd === today.getDate());
    const txs = isCur ? (txByDay[dd] || []) : [];
    const dayTotal = txs.reduce((s, r) => s + (r.exp || 0), 0);

    let cls = 'cal-day';
    if (!isCur) cls += ' other-month';
    else if (txs.length > 0) cls += ' has-data';
    if (isToday) cls += ' today';

    const txJson = JSON.stringify(txs.map(r => ({
      cat: r.cat, pm: r.pm, amt: r.exp || r.inc, type: r.cat==='Income'?'income':(r.cat==='Investment'?'invest':'')
    }))).replace(/'/g,'&#39;');
    
    const dateStr = `${dy}-${String(dm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const totalStr = dayTotal ? fRpS(dayTotal) : '';
    // FIX: Selalu aktifkan klik pada minggu berjalan[cite: 1]
    const clickAttr = `onclick="calSelectDay(this,'${dateStr}','${totalStr}')"`;

    cells += `<div class="${cls}" ${clickAttr} data-txns='${txJson}'>
      <div class="cal-day-num">${dd}</div>
      ${dayTotal ? `<div class="cal-day-total">${calFormatAmount(dayTotal)}</div>` : (isToday ? '<div class="cal-day-total">Today</div>' : '')}
    </div>`;
  }
  return `<div class="cal-week-row" id="calCurWeekRow">${cells}</div>`;
}
