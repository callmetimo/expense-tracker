<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="40" fill="#0f0f0f"/>
  <!-- Banknote shape -->
  <rect x="26" y="46" width="128" height="72" rx="9" fill="none" stroke="#c8f060" stroke-width="4"/>
  <!-- Inner border -->
  <rect x="34" y="54" width="112" height="56" rx="5" fill="none" stroke="#c8f060" stroke-width="1.5" opacity="0.35"/>
  <!-- Center circle with $ -->
  <circle cx="90" cy="82" r="18" fill="none" stroke="#c8f060" stroke-width="2.5" opacity="0.65"/>
  <text x="90" y="89" font-family="-apple-system,system-ui,sans-serif" font-size="18" font-weight="700" fill="#c8f060" text-anchor="middle">$</text>
  <!-- Left dashes -->
  <line x1="42" y1="72" x2="60" y2="72" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="42" y1="82" x2="60" y2="82" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="42" y1="92" x2="60" y2="92" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Right dashes -->
  <line x1="120" y1="72" x2="138" y2="72" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="120" y1="82" x2="138" y2="82" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="120" y1="92" x2="138" y2="92" stroke="#c8f060" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Nota wordmark -->
  <text x="90" y="148" font-family="-apple-system,system-ui,sans-serif" font-size="28" font-weight="700" fill="#c8f060" text-anchor="middle" letter-spacing="3">Nota</text>
</svg>
